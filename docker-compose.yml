services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: smartgestion
      DB_USERNAME: smartgestion
      DB_PASSWORD: smartgestion
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: smartgestion
      POSTGRES_USER: smartgestion
      POSTGRES_PASSWORD: smartgestion
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartgestion"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres:
  storage:
